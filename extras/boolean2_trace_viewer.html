<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Boolean2 Trace Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --ink: #1f2523;
      --muted: #66716d;
      --line: #cfd7d2;
      --accent: #0d7c66;
      --subject: #1f77b4;
      --clip: #d1495b;
      --candidate: #8a63d2;
      --output: #0b6e4f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr) 300px;
      height: 100vh;
    }

    aside {
      background: var(--panel);
      border-right: 1px solid var(--line);
      overflow: auto;
      padding: 16px;
    }

    aside.details {
      border-right: 0;
      border-left: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 650;
    }

    h2 {
      margin: 20px 0 8px;
      font-size: 13px;
      text-transform: uppercase;
      color: var(--muted);
    }

    input[type="file"], select, button {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    label.toggle {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 8px 0;
      color: var(--ink);
    }

    label.toggle input {
      width: 16px;
      height: 16px;
      margin: 0;
    }

    .meta, .hint, .empty {
      color: var(--muted);
      font-size: 13px;
    }

    .phase-description {
      margin: 8px 0 0;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f9faf8;
      color: var(--ink);
      font-size: 13px;
    }

    main {
      position: relative;
      min-width: 0;
      overflow: hidden;
      background:
        linear-gradient(#ecefeb 1px, transparent 1px),
        linear-gradient(90deg, #ecefeb 1px, transparent 1px);
      background-size: 24px 24px;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      user-select: none;
    }

    .segment {
      stroke-linecap: round;
      vector-effect: non-scaling-stroke;
      cursor: pointer;
    }

    .point {
      vector-effect: non-scaling-stroke;
      cursor: pointer;
    }

    .polygon {
      vector-effect: non-scaling-stroke;
      cursor: pointer;
    }

    .label {
      font-size: 11px;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .ghost {
      opacity: 0.22;
      filter: grayscale(1);
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .tooltip {
      position: absolute;
      display: none;
      max-width: 360px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
      pointer-events: none;
      font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      z-index: 5;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr) 220px;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        max-height: 260px;
      }

      aside.details {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>Boolean2 Trace</h1>
      <input id="file" type="file" accept="application/json,.json">
      <p class="hint">Load a trace JSON produced by the debug fixture, or pass
        <code>?trace=URL</code> in the address bar.</p>

      <h2>Phase</h2>
      <select id="phase"></select>
      <div class="row">
        <button id="prev" type="button">Previous</button>
        <button id="next" type="button">Next</button>
      </div>
      <p id="phaseMeta" class="meta">No trace loaded.</p>
      <p id="phaseDescription" class="phase-description">Load a trace to see the phase narrative.</p>

      <h2>Layers</h2>
      <label class="toggle"><input id="showPolygons" type="checkbox" checked> polygons</label>
      <label class="toggle"><input id="showSegments" type="checkbox" checked> segments</label>
      <label class="toggle"><input id="showPoints" type="checkbox" checked> points</label>
      <label class="toggle"><input id="showLabels" type="checkbox"> labels</label>
      <label class="toggle"><input id="showGhost" type="checkbox" checked> previous phase ghost</label>

      <h2>View</h2>
      <div class="row">
        <button id="zoomIn" type="button">Zoom In</button>
        <button id="zoomOut" type="button">Zoom Out</button>
      </div>
      <div class="row">
        <button id="fitPhase" type="button">Fit Phase</button>
        <button id="reset" type="button">Reset View</button>
      </div>
    </aside>

    <main id="canvas">
      <svg id="svg" role="img" aria-label="Boolean2 trace visualization"></svg>
      <div id="tooltip" class="tooltip"></div>
    </main>

    <aside class="details">
      <h2>Selection</h2>
      <pre id="details">Nothing selected.</pre>
      <h2>Annotations</h2>
      <pre id="annotations">No phase loaded.</pre>
    </aside>
  </div>

  <script>
    const state = {
      trace: null,
      phaseIndex: 0,
      viewBox: null,
      renderScale: 1,
      drag: null,
      traceSource: '',
    };

    const kRenderExtent = 1000;

    const els = {
      file: document.getElementById('file'),
      phase: document.getElementById('phase'),
      phaseMeta: document.getElementById('phaseMeta'),
      phaseDescription: document.getElementById('phaseDescription'),
      svg: document.getElementById('svg'),
      canvas: document.getElementById('canvas'),
      tooltip: document.getElementById('tooltip'),
      details: document.getElementById('details'),
      annotations: document.getElementById('annotations'),
      prev: document.getElementById('prev'),
      next: document.getElementById('next'),
      zoomIn: document.getElementById('zoomIn'),
      zoomOut: document.getElementById('zoomOut'),
      fitPhase: document.getElementById('fitPhase'),
      reset: document.getElementById('reset'),
      showPolygons: document.getElementById('showPolygons'),
      showSegments: document.getElementById('showSegments'),
      showPoints: document.getElementById('showPoints'),
      showLabels: document.getElementById('showLabels'),
      showGhost: document.getElementById('showGhost'),
    };

    function svgEl(name, attrs = {}) {
      const node = document.createElementNS('http://www.w3.org/2000/svg', name);
      for (const [key, value] of Object.entries(attrs)) {
        node.setAttribute(key, value);
      }
      return node;
    }

    function colorFor(item) {
      const text = `${item.kind || ''} ${item.source || ''} ${item.label || ''}`;
      if (text.includes('outer_face')) return '#69746f';
      if (item.inside === true) return 'var(--output)';
      if ((item.kind || '') === 'face') return '#8a9a94';
      if (text.includes('candidate')) return 'var(--candidate)';
      if (text.includes('retained') || text.includes('final')) return 'var(--output)';
      if (item.mult < 0 || text.includes('clip')) return 'var(--clip)';
      if (item.mult > 0 || text.includes('input')) return 'var(--subject)';
      return '#47524d';
    }

    const phaseNarratives = {
      seed_metadata:
        'Trace notes for the seed. This phase is metadata only; the visible geometry starts in the next phase.',
      input:
        'Input to this boolean2 operation. For constructor-driven fixtures this is already the regularized CrossSection polygon data, not necessarily the raw fuzzer polygon.',
      merged_vertices:
        'Vertices close enough under eps have been merged and the original input vertex ids are remapped to their representatives.',
      collapsed_edges:
        'Input edges after vertex merging. Edges whose endpoints collapsed are removed before intersection discovery.',
      broad_phase_pairs:
        'AABB overlap candidates for edge-edge and edge-vertex work. Dashed candidate edges show pairs that will be checked by the narrow phase.',
      edge_vert_lists:
        'Per-edge split lists after the narrow phase records vertices and proper intersections that lie on each edge.',
      inserted_intersections:
        'Arrangement edges after inserting the split vertices found by the edge-vertex and edge-edge narrow phase.',
      nearby_intersection_merge:
        'Nearby generated intersection vertices are consolidated before canonical edge construction.',
      canonical_subedges:
        'Directed split edges are canonicalized into undirected subedges with multiplicities, canceling exact opposites.',
      halfedge_faces:
        'The canonical subedges have been walked into faces. Winding and inside annotations decide which boundaries survive the selected boolean rule.',
      filtered_output_edges:
        'Edges retained after comparing the inside state on the two incident faces for the selected boolean rule.',
      final_polygons:
        'Final contours materialized from the retained output edges.',
    };

    function describePhase(phase) {
      if (!phase) return 'No phase loaded.';
      return phaseNarratives[phase.name] ||
        'No built-in narrative for this phase. Inspect annotations and selected geometry for details.';
    }

    function phasePoints(phase) {
      const pts = [];
      for (const p of phase.points || []) pts.push(p.xy);
      for (const s of phase.segments || []) {
        pts.push(s.a, s.b);
      }
      for (const p of phase.polygons || []) {
        for (const v of p.verts || []) pts.push(v);
      }
      return pts.filter((p) => p && Number.isFinite(p[0]) && Number.isFinite(p[1]));
    }

    function allPoints(trace) {
      const pts = [];
      for (const phase of trace.phases || []) {
        pts.push(...phasePoints(phase));
      }
      return pts;
    }

    function viewBoxForPoints(pts) {
      if (!pts.length) return [-1, -1, 2, 2];
      let minX = pts[0][0], minY = pts[0][1], maxX = minX, maxY = minY;
      for (const [x, y] of pts) {
        minX = Math.min(minX, x);
        minY = Math.min(minY, y);
        maxX = Math.max(maxX, x);
        maxY = Math.max(maxY, y);
      }
      const w = Math.max(maxX - minX, 1e-9);
      const h = Math.max(maxY - minY, 1e-9);
      const pad = 0.08 * Math.max(w, h);
      return [minX - pad, -maxY - pad, w + 2 * pad, h + 2 * pad];
    }

    function defaultViewBox(trace) {
      return viewBoxForPoints(allPoints(trace));
    }

    function currentPhaseViewBox() {
      if (!state.trace) return null;
      const phase = (state.trace.phases || [])[state.phaseIndex];
      if (!phase) return null;
      return viewBoxForPoints(phasePoints(phase));
    }

    function fitCurrentPhase() {
      const vb = currentPhaseViewBox();
      if (vb) setViewBox(vb);
    }

    function pt([x, y]) {
      if (!state.viewBox) return [x, -y];
      return [
        (x - state.viewBox[0]) * state.renderScale,
        (-y - state.viewBox[1]) * state.renderScale,
      ];
    }

    function setViewBox(vb) {
      state.viewBox = vb;
      state.renderScale = kRenderExtent / Math.max(vb[2], vb[3]);
      els.svg.setAttribute(
        'viewBox',
        [0, 0, vb[2] * state.renderScale, vb[3] * state.renderScale].join(' '),
      );
    }

    function showDetails(item) {
      els.details.textContent = JSON.stringify(item, null, 2);
    }

    function bindInspect(node, item) {
      node.addEventListener('mouseenter', (event) => {
        els.tooltip.style.display = 'block';
        els.tooltip.textContent = `${item.id || item.kind || 'item'}\n${item.label || item.kind || ''}`;
        moveTooltip(event);
      });
      node.addEventListener('mousemove', moveTooltip);
      node.addEventListener('mouseleave', () => {
        els.tooltip.style.display = 'none';
      });
      node.addEventListener('click', (event) => {
        event.stopPropagation();
        showDetails(item);
      });
    }

    function moveTooltip(event) {
      els.tooltip.style.left = `${event.clientX + 12}px`;
      els.tooltip.style.top = `${event.clientY + 12}px`;
    }

    function renderPolygonOutline(group, poly, ghost) {
      const verts = poly.verts || [];
      if (verts.length < 2) return;
      for (let i = 0; i < verts.length; ++i) {
        const a = pt(verts[i]);
        const b = pt(verts[(i + 1) % verts.length]);
        const node = svgEl('line', {
          x1: a[0],
          y1: a[1],
          x2: b[0],
          y2: b[1],
          class: 'segment',
          stroke: colorFor(poly),
          'stroke-width': ghost ? '1' : '2',
          'stroke-dasharray': (poly.kind || '').includes('outer_face') ? '5 4' : '',
        });
        bindInspect(node, poly);
        group.appendChild(node);
        if (!ghost && els.showLabels.checked) {
          const lx = (a[0] + b[0]) * 0.5;
          const ly = (a[1] + b[1]) * 0.5;
          const text = svgEl('text', { x: lx, y: ly, class: 'label', fill: colorFor(poly) });
          text.textContent = `${poly.id || 'poly'}.e${i}`;
          group.appendChild(text);
        }
      }
    }

    function renderPolygonVerts(group, poly, ghost) {
      for (let i = 0; i < (poly.verts || []).length; ++i) {
        const v = poly.verts[i];
        const p = pt(v);
        const node = svgEl('circle', {
          cx: p[0],
          cy: p[1],
          r: ghost ? 0.8 : 1.8,
          class: 'point',
          fill: colorFor(poly),
          stroke: '#fff',
          'stroke-width': ghost ? '0.5' : '0.8',
        });
        bindInspect(node, poly);
        group.appendChild(node);
        if (!ghost && els.showLabels.checked) {
          const text = svgEl('text', {
            x: p[0],
            y: p[1],
            dx: 3,
            dy: -3,
            class: 'label',
            fill: colorFor(poly),
          });
          text.textContent = `${poly.id || 'poly'}.v${i}`;
          group.appendChild(text);
        }
      }
    }

    function renderPhase(phase, ghost = false) {
      const group = svgEl('g', { class: ghost ? 'ghost' : '' });
      if (els.showPolygons.checked) {
        for (const poly of phase.polygons || []) {
          const pts = (poly.verts || []).map((v) => {
            const [x, y] = pt(v);
            return `${x},${y}`;
          }).join(' ');
          const outer = (poly.kind || '').includes('outer_face');
          const node = svgEl('polygon', {
            points: pts,
            class: 'polygon',
            fill: ghost || outer ? 'none' : colorFor(poly),
            'fill-opacity': ghost || outer ? '0' : (poly.inside ? '0.18' : '0.08'),
            stroke: colorFor(poly),
            'stroke-width': outer ? '1' : (ghost ? '1' : '1.5'),
            'stroke-dasharray': outer ? '5 4' : '',
          });
          bindInspect(node, poly);
          group.appendChild(node);
          renderPolygonOutline(group, poly, ghost);
        }
      }
      if (els.showSegments.checked) {
        for (const seg of phase.segments || []) {
          const a = pt(seg.a);
          const b = pt(seg.b);
          const node = svgEl('line', {
            x1: a[0],
            y1: a[1],
            x2: b[0],
            y2: b[1],
            class: 'segment',
            stroke: colorFor(seg),
            'stroke-width': ghost ? '1' : '2',
            'stroke-dasharray': (seg.kind || '').includes('candidate') ? '4 3' : '',
          });
          bindInspect(node, seg);
          group.appendChild(node);
          if (!ghost && els.showLabels.checked) {
            const lx = (a[0] + b[0]) * 0.5;
            const ly = (a[1] + b[1]) * 0.5;
            const text = svgEl('text', { x: lx, y: ly, class: 'label', fill: colorFor(seg) });
            text.textContent = seg.id || '';
            group.appendChild(text);
          }
        }
      }
      if (els.showPoints.checked) {
        if (els.showPolygons.checked) {
          for (const poly of phase.polygons || []) {
            renderPolygonVerts(group, poly, ghost);
          }
        }
        for (const point of phase.points || []) {
          const p = pt(point.xy);
          const node = svgEl('circle', {
            cx: p[0],
            cy: p[1],
            r: ghost ? 0.8 : 1.8,
            class: 'point',
            fill: colorFor(point),
            stroke: '#fff',
            'stroke-width': ghost ? '0.5' : '0.8',
          });
          bindInspect(node, point);
          group.appendChild(node);
          if (!ghost && els.showLabels.checked) {
            const text = svgEl('text', {
              x: p[0],
              y: p[1],
              dx: 3,
              dy: -3,
              class: 'label',
              fill: colorFor(point),
            });
            text.textContent = point.id || '';
            group.appendChild(text);
          }
        }
      }
      return group;
    }

    function render() {
      els.svg.replaceChildren();
      if (!state.trace) {
        els.phaseMeta.textContent = 'No trace loaded.';
        els.phaseDescription.textContent = 'Load a trace to see the phase narrative.';
        els.annotations.textContent = 'No phase loaded.';
        return;
      }
      const phases = state.trace.phases || [];
      const phase = phases[state.phaseIndex];
      if (!phase) return;
      if (els.showGhost.checked && state.phaseIndex > 0) {
        els.svg.appendChild(renderPhase(phases[state.phaseIndex - 1], true));
      }
      els.svg.appendChild(renderPhase(phase, false));
      els.phase.value = String(state.phaseIndex);
      els.phaseMeta.textContent =
        `${state.phaseIndex + 1}/${phases.length}: ${phase.name} - ` +
        `${(phase.points || []).length} points, ${(phase.segments || []).length} segments, ` +
        `${(phase.polygons || []).length} polygons`;
      els.phaseDescription.textContent = describePhase(phase);
      els.annotations.textContent = (phase.annotations || []).length
        ? JSON.stringify(phase.annotations, null, 2)
        : 'No annotations for this phase.';
    }

    function phaseIndexFromParam(trace, value) {
      if (!value) return 0;
      const phases = trace.phases || [];
      const numeric = Number(value);
      if (Number.isInteger(numeric) && numeric >= 0 && numeric < phases.length) {
        return numeric;
      }
      const decoded = decodeURIComponent(value);
      const named = phases.findIndex((phase) => phase.name === decoded);
      return named >= 0 ? named : 0;
    }

    function loadTrace(trace, source = '') {
      state.trace = trace;
      state.phaseIndex = phaseIndexFromParam(trace, params.get('phase'));
      state.traceSource = source;
      els.phase.replaceChildren();
      for (let i = 0; i < (trace.phases || []).length; ++i) {
        const option = document.createElement('option');
        option.value = String(i);
        option.textContent = trace.phases[i].name || `phase ${i + 1}`;
        els.phase.appendChild(option);
      }
      setViewBox(defaultViewBox(trace));
      fitCurrentPhase();
      render();
    }

    async function loadTraceUrl(url) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status} loading ${url}`);
      }
      loadTrace(await response.json(), url);
    }

    function zoomAt(factor, anchor = null) {
      if (!state.viewBox) return;
      const [x, y, w, h] = state.viewBox;
      let ax = x + w / 2;
      let ay = y + h / 2;
      if (anchor) {
        ax = x + anchor[0] / state.renderScale;
        ay = y + anchor[1] / state.renderScale;
      }
      const nw = w * factor;
      const nh = h * factor;
      const nx = ax - (ax - x) * factor;
      const ny = ay - (ay - y) * factor;
      setViewBox([nx, ny, nw, nh]);
      render();
    }

    function zoom(factor) {
      zoomAt(factor);
    }

    function svgPoint(event) {
      const pt = els.svg.createSVGPoint();
      pt.x = event.clientX;
      pt.y = event.clientY;
      const transformed = pt.matrixTransform(els.svg.getScreenCTM().inverse());
      return [transformed.x, transformed.y];
    }

    els.file.addEventListener('change', async () => {
      const file = els.file.files[0];
      if (!file) return;
      loadTrace(JSON.parse(await file.text()), file.name);
    });

    els.phase.addEventListener('change', () => {
      state.phaseIndex = Number(els.phase.value);
      fitCurrentPhase();
      render();
    });

    els.prev.addEventListener('click', () => {
      if (!state.trace) return;
      state.phaseIndex = Math.max(0, state.phaseIndex - 1);
      fitCurrentPhase();
      render();
    });

    els.next.addEventListener('click', () => {
      if (!state.trace) return;
      state.phaseIndex = Math.min(state.trace.phases.length - 1, state.phaseIndex + 1);
      fitCurrentPhase();
      render();
    });

    for (const id of ['showPolygons', 'showSegments', 'showPoints', 'showLabels', 'showGhost']) {
      els[id].addEventListener('change', render);
    }

    els.zoomIn.addEventListener('click', () => zoom(0.75));
    els.zoomOut.addEventListener('click', () => zoom(1.33));
    els.fitPhase.addEventListener('click', () => {
      fitCurrentPhase();
      render();
    });
    els.reset.addEventListener('click', () => {
      if (!state.trace) return;
      setViewBox(defaultViewBox(state.trace));
      render();
    });

    els.svg.addEventListener('click', () => {
      els.details.textContent = 'Nothing selected.';
    });

    els.svg.addEventListener('wheel', (event) => {
      event.preventDefault();
      zoomAt(event.deltaY < 0 ? 0.85 : 1.18, svgPoint(event));
    }, { passive: false });

    els.svg.addEventListener('mousedown', (event) => {
      if (!state.viewBox) return;
      state.drag = {
        clientX: event.clientX,
        clientY: event.clientY,
        viewBox: state.viewBox.slice(),
        renderScale: state.renderScale,
      };
    });

    window.addEventListener('mousemove', (event) => {
      if (!state.drag) return;
      const svgRect = els.svg.getBoundingClientRect();
      const renderWidth = state.drag.viewBox[2] * state.drag.renderScale;
      const renderHeight = state.drag.viewBox[3] * state.drag.renderScale;
      const dx =
        (state.drag.clientX - event.clientX) * renderWidth /
        (svgRect.width * state.drag.renderScale);
      const dy =
        (state.drag.clientY - event.clientY) * renderHeight /
        (svgRect.height * state.drag.renderScale);
      const [x, y, w, h] = state.drag.viewBox;
      setViewBox([x + dx, y + dy, w, h]);
      render();
    });

    window.addEventListener('mouseup', () => {
      state.drag = null;
    });

    const params = new URLSearchParams(window.location.search);
    const traceUrl = params.get('trace');
    if (traceUrl) {
      const resolved = new URL(traceUrl, window.location.href).href;
      els.phaseMeta.textContent = `Loading ${resolved}`;
      loadTraceUrl(resolved).catch((error) => {
        els.phaseMeta.textContent = `Failed to load trace: ${error.message}`;
      });
    }
  </script>
</body>
</html>
